    <!-- Tailwind CSS ve Google Fontlar -->

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <!-- Three.js (3D Parçacıklar ve Evren) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- MediaPipe El Takibi -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020205;
            color: #f3f4f6;
            overflow: hidden;

            transition: opacity 0.5s ease-out;
        }

<body class="relative w-screen h-screen">

    <!-- Üst Başlık ve Tema Göstergesi -->
    <div class="absolute top-6 left-6 z-30 pointer-events-none">
        <h1 class="font-jjk text-3xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-500 uppercase">
            Jujutsu Kaisen
        </h1>
        <p class="text-xs text-gray-400 tracking-wider mt-1 uppercase">Sonsuz Boşluk & Lanetli Teknik Portalı</p>
    </div>

    <!-- 3D Görselleştirme Tuvali -->
    <canvas id="three-canvas" class="absolute inset-0 w-full h-full z-0"></style>

    <!-- Kamera ve El Takip İzleyicisi (Sağ Üst) -->
    <div class="absolute top-6 right-6 z-30 flex flex-col items-end gap-3">
        <div class="glass-panel p-3 rounded-2xl shadow-2xl flex flex-col items-center gap-2">
            <span class="text-[10px] tracking-widest text-cyan-400 uppercase font-semibold flex items-center gap-1.5">
                <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span> CANLI EL KAMERASI
            </span>
            <div class="relative w-48 h-36 rounded-xl overflow-hidden bg-black/50 border border-white/10 shadow-inner">
                <video id="webcam" class="w-full h-full object-cover" autoplay playsinline muted></video>
                <canvas id="gesture-canvas" class="absolute inset-0 w-full h-full pointer-events-none transform scaleX(-1)"></canvas>
            </div>
            <p id="gesture-status" class="text-xs text-gray-400 italic">Kamera başlatılıyor...</p>
        </div>
    </div>

    <!-- Kontrol Paneli ve Manuel Tetikleyiciler (Alt Merkez) -->
    <div class="absolute bottom-10 left-1/2 transform -translate-x-1/2 z-30 w-full max-w-xl px-4">
        <div class="glass-panel p-6 rounded-3xl shadow-2xl flex flex-col gap-5 border border-white/10">
            <!-- Durum Bilgisi -->
            <div class="text-center">
                <h2 id="domain-title" class="font-jjk text-2xl font-bold tracking-wider text-white transition-all duration-500">
                    Sıradan Gerçeklik
                </h2>
                <p id="domain-subtitle" class="text-xs text-gray-400 mt-1 transition-all duration-500">
                    Sonsuz Boşluğu açmak için aşağıdaki butona basın veya kameraya parmaklarınızı çaprazlayarak gösterin!
                </p>
            </div>

            <!-- Kontroller ve Ses Seçenekleri -->
            <div class="flex items-center justify-between gap-4 border-t border-white/5 pt-4">
                <div class="flex flex-col gap-1">
                    <label class="text-[10px] text-gray-400 tracking-wider uppercase font-semibold">Gojo Ses Tonu</label>
                    <select id="voice-select" class="bg-white/5 border border-white/10 rounded-lg px-2 py-1 text-xs text-gray-300 focus:outline-none focus:border-cyan-500">
                        <option value="Fenrir" selected>Fenrir (Heyecanlı/Güçlü)</option>
                        <option value="Orus">Orus (Kararlı/Derin)</option>
                        <option value="Charon">Charon (Bilge/Gizemli)</option>
                        <option value="Kore">Kore (Sert/Net)</option>
                    </select>
                </div>

                <!-- Manuel Tetikleyici Buton -->
                <button id="trigger-btn" class="relative group overflow-hidden px-8 py-3.5 rounded-2xl bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 font-semibold tracking-wider text-sm transition-all duration-300 hover:scale-105 active:scale-95 shadow-lg shadow-indigo-500/20 hover:shadow-indigo-500/40 text-white">
                    <span class="absolute inset-0 w-full h-full bg-white/10 transform -skew-x-12 -translate-x-full group-hover:animate-shimmer"></span>
                    <span class="flex items-center gap-2">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> 領域展開 (ALAN GENİŞLETME)
                    </span>
                </button>

                <!-- Resetleme Butonu -->
                <button id="reset-btn" class="p-3 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition text-gray-400 hover:text-white" title="Alanı Kapat">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Bildirim / Altyazı Kutusu -->
    <div id="subtitles" class="absolute bottom-40 left-1/2 transform -translate-x-1/2 z-40 bg-black/80 px-6 py-2.5 rounded-full border border-white/10 text-center opacity-0 transition-opacity duration-300 pointer-events-none">
        <p id="subtitle-ja" class="font-jjk text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 tracking-widest"></p>
        <p id="subtitle-tr" class="text-xs text-gray-400 mt-0.5 tracking-wide"></p>
    </div>

    <script>
        // --- GLOBAL DEĞİŞKENLER ---
        let scene, camera, renderer, starGeometry, stars, eventHorizon, nebulaParticles = [];
        let isDomainActive = false;
        let animationFrameId;
        let originalStarsPosition = [];

        // --- THREE.JS BAŞLATMA ---
        function initThree() {
            const canvas = document.getElementById('three-canvas');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020205, 0.005);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 100;

            renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);

            // Kozmik Yıldız Kümesi Oluşturma
            const starsCount = 6000;
            starGeometry = new THREE.BufferGeometry();
            const starPositions = new Float32Array(starsCount * 3);
            const starColors = new Float32Array(starsCount * 3);

            for (let i = 0; i < starsCount * 3; i += 3) {
                // Küresel dağılım
                const r = 120 + Math.random() * 300;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);

                starPositions[i] = r * Math.sin(phi) * Math.cos(theta);
                starPositions[i + 1] = r * Math.sin(phi) * Math.sin(theta);
                starPositions[i + 2] = r * Math.cos(phi);

                originalStarsPosition.push({ x: starPositions[i], y: starPositions[i+1], z: starPositions[i+2] });

                // Renkler: Mavi, Mor ve Beyaz geçişleri
                const mix = Math.random();
                if (mix < 0.4) {
                    starColors[i] = 0.4;     // R
                    starColors[i + 1] = 0.6; // G
                    starColors[i + 2] = 1.0; // B (Mavi)
                } else if (mix < 0.8) {
                    starColors[i] = 0.7;     // R
                    starColors[i + 1] = 0.3; // G
                    starColors[i + 2] = 1.0; // B (Mor)
                } else {
                    starColors[i] = 1.0;     // R
                    starColors[i + 1] = 1.0; // G
                    starColors[i + 2] = 1.0; // B (Beyaz)
                }
            }

            starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            starGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

            const starMaterial = new THREE.PointsMaterial({
                size: 1.5,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });

            stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);

            // Olay Ufku (Sonsuz Boşluğun Sınır Küresi)
            const horizonGeo = new THREE.SphereGeometry(1, 32, 32);
            const horizonMat = new THREE.MeshBasicMaterial({
                color: 0x050510,
                transparent: true,
                opacity: 0,
                wireframe: true
            });
            eventHorizon = new THREE.Mesh(horizonGeo, horizonMat);
            scene.add(eventHorizon);

            // Nebulalar (Büyük Toz Bulutları)
            const nebulaGeo = new THREE.BoxGeometry(20, 20, 20);
            for (let i = 0; i < 20; i++) {
                const nebulaMat = new THREE.MeshBasicMaterial({
                    color: i % 2 === 0 ? 0x0a1530 : 0x200535,
                    transparent: true,
                    opacity: 0,
                    blending: THREE.AdditiveBlending
                });
                const mesh = new THREE.Mesh(nebulaGeo, nebulaMat);
                mesh.position.set(
                    (Math.random() - 0.5) * 150,
                    (Math.random() - 0.5) * 150,
                    (Math.random() - 0.5) * 150
                );
                mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
                scene.add(mesh);
                nebulaParticles.push({ mesh, mat: nebulaMat, speed: 0.002 + Math.random() * 0.003 });
            }

            // Pencere Boyutlandırma Dinamikleri
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Sahne Animasyonu Döngüsü
        function animate() {
            animationFrameId = requestAnimationFrame(animate);

            const time = Date.now() * 0.0005;

            // Yıldızların yavaşça süzülmesi
            stars.rotation.y = time * 0.05;
            stars.rotation.x = time * 0.02;

            // Alan aktifse efektleri genişlet ve görsel patlama yaşat
            if (isDomainActive) {
                // Kürenin devasa genişlemesi
                if (eventHorizon.scale.x < 85) {
                    eventHorizon.scale.addScalar(1.2);
                    eventHorizon.material.opacity = Math.min(eventHorizon.material.opacity + 0.02, 0.45);
                }
                eventHorizon.rotation.y += 0.01;
                eventHorizon.rotation.z += 0.005;

                // Kamera hareketi (Sonsuzluğun içine süzülme hissi)
                camera.position.z = 100 + Math.sin(time * 2) * 12;
                camera.rotation.z = time * 0.08;

                // Toz bulutlarının (Nebula) belirginleşmesi ve süzülmesi
                nebulaParticles.forEach(n => {
                    n.mesh.rotation.x += n.speed;
                    n.mesh.rotation.y += n.speed;
                    n.mat.opacity = Math.min(n.mat.opacity + 0.01, 0.25);
                });
            } else {
                // Alanı sıfırla ve süzülmeyi sakinleştir
                if (eventHorizon.scale.x > 1) {
                    eventHorizon.scale.subScalar(2);
                    eventHorizon.material.opacity = Math.max(eventHorizon.material.opacity - 0.05, 0);
                }
                nebulaParticles.forEach(n => {
                    n.mat.opacity = Math.max(n.mat.opacity - 0.05, 0);
                });
                camera.position.z = THREE.MathUtils.lerp(camera.position.z, 100, 0.05);
                camera.rotation.z = THREE.MathUtils.lerp(camera.rotation.z, 0, 0.05);
            }

            renderer.render(scene, camera);
        }
    </script>

    <script>
        // --- AUDIO SENTEZLEYİCİ & SES DOSYALARI ---
        let audioCtx;
        
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 1. Bass Drop ve Whoosh Efektleri (Sonsuz Boşluk Patlaması)
        function playBassDrop() {
            initAudio();
            const ctx = audioCtx;

            // Osilatörler (Ana Bas ve Sub Bas)
            const oscMain = ctx.createOscillator();
            const oscSub = ctx.createOscillator();
            const filter = ctx.createBiquadFilter();
            const gainNode = ctx.createGain();

            oscMain.type = 'sawtooth';
            oscSub.type = 'sine';

            // Zamanlayıcıyı ayarla
            const startTime = ctx.currentTime;
            const duration = 5.0;

            // Frekans Sürüklenmeleri (Frekans yüksekten inanılmaz derine iner)
            oscMain.frequency.setValueAtTime(320, startTime);
            oscMain.frequency.exponentialRampToValueAtTime(30, startTime + 3.0);

            oscSub.frequency.setValueAtTime(60, startTime);
            oscSub.frequency.exponentialRampToValueAtTime(20, startTime + 4.0);

            // Rezonans Filtresi (Anime ses kalitesini yakalamak için)
            filter.type = 'lowpass';
            filter.Q.setValueAtTime(12, startTime);
            filter.frequency.setValueAtTime(900, startTime);
            filter.frequency.exponentialRampToValueAtTime(35, startTime + 2.5);

            // Volüm Zarfı (Giderek patlar ve sonra sönümlenir)
            gainNode.gain.setValueAtTime(0.01, startTime);
            gainNode.gain.linearRampToValueAtTime(0.85, startTime + 0.3); // Hızlı patlama
            gainNode.gain.exponentialRampToValueAtTime(0.001, startTime + duration);

            // Bağlantılar
            oscMain.connect(filter);
            filter.connect(gainNode);
            oscSub.connect(gainNode);
            gainNode.connect(ctx.destination);

            // Başlat ve Bitir
            oscMain.start(startTime);
            oscSub.start(startTime);
            oscMain.stop(startTime + duration);
            oscSub.stop(startTime + duration);

            // Gürültülü Bir Esinti (Whoosh) Efekti Ekle
            playWhoosh(ctx, startTime);
        }

        // Kozmik rüzgar / Alan genişletme genişleme sesi
        function playWhoosh(ctx, startTime) {
            const bufferSize = ctx.sampleRate * 2.5; // 2.5 Saniye
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);

            // Beyaz Gürültü (White Noise) üretimi
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const noiseNode = ctx.createBufferSource();
            noiseNode.buffer = buffer;

            const noiseFilter = ctx.createBiquadFilter();
            noiseFilter.type = 'bandpass';
            noiseFilter.Q.setValueAtTime(8, startTime);
            noiseFilter.frequency.setValueAtTime(1200, startTime);
            noiseFilter.frequency.exponentialRampToValueAtTime(150, startTime + 2.0);

            const noiseGain = ctx.createGain();
            noiseGain.gain.setValueAtTime(0.01, startTime);
            noiseGain.gain.linearRampToValueAtTime(0.35, startTime + 0.2);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, startTime + 2.5);

            noiseNode.connect(noiseFilter);
            noiseFilter.connect(noiseGain);
            noiseGain.connect(ctx.destination);

            noiseNode.start(startTime);
            noiseNode.stop(startTime + 2.5);
        }

        // Base64 dönüşümü için yardımcı fonksiyonlar (Gemini TTS için)
        function base64ToArrayBuffer(base64) {
            const binaryString = window.atob(base64);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            return bytes.buffer;
        }

        function pcmToWav(pcm16, sampleRate) {
            const buffer = new ArrayBuffer(44 + pcm16.length * 2);
            const view = new DataView(buffer);

            // RIFF format kısımları
            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + pcm16.length * 2, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); // PCM format
            view.setUint16(22, 1, true); // Tek kanal (Mono)
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true); // 16 Bit
            writeString(view, 36, 'data');
            view.setUint32(40, pcm16.length * 2, true);

            for (let i = 0; i < pcm16.length; i++) {
                view.setInt16(44 + i * 2, pcm16[i], true);
            }

            return new Blob([view], { type: 'audio/wav' });
        }

        function writeString(view, offset, string) {
            for (let i = 0; i < string.length; i++) {
                view.setUint8(offset + i, string.charCodeAt(i));
            }
        }

        // 2. Gemini TTS Entegrasyonu: Gojo Seslendirmesi
        async function fetchGojoVoice() {
            const selectedVoice = document.getElementById('voice-select').value;
            // Gemini API'ya gönderilecek talimat
            const prompt = `Say in a highly dramatic, slow, cool, deep anime voice, representing Gojo Satoru casting his domain expansion: '領域展開。無量空処。' (Ryōiki Tenkai. Muryō Kūsho.) with a major breathy pause before '無量空処'.`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: {
                    responseModalities: ["AUDIO"],
                    speechConfig: {
                        voiceConfig: {
                            prebuiltVoiceConfig: { voiceName: selectedVoice }
                        }
                    }
                },
                model: "gemini-2.5-flash-preview-tts"
            };

            const apiKey = ""; // Runtime otomatik enjeksiyon
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                const part = result?.candidates?.[0]?.content?.parts?.[0];
                const audioData = part?.inlineData?.data;
                const mimeType = part?.inlineData?.mimeType;

                if (audioData && mimeType && mimeType.startsWith("audio/")) {
                    const sampleRate = parseInt(mimeType.match(/rate=(\d+)/)?.[1] || "24000", 10);
                    const pcmData = base64ToArrayBuffer(audioData);
                    const pcm16 = new Int16Array(pcmData);
                    const wavBlob = pcmToWav(pcm16, sampleRate);
                    return URL.createObjectURL(wavBlob);
                }
            } catch (error) {
                console.error("Gemini TTS sesi alınamadı, tarayıcı sesine geçiliyor:", error);
            }
            return null;
        }

        // Gojo Sonsuz Boşluk Aktivasyon Rutini
        async function triggerInfiniteVoid() {
            if (isDomainActive) return;
            isDomainActive = true;

            // Arayüz Değişiklikleri
            document.getElementById('domain-title').innerText = "領域展開：無量空処";
            document.getElementById('domain-title').className = "font-jjk text-3xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 neon-purple animate-pulse";
            document.getElementById('domain-subtitle').innerText = "Sonsuz Boşluk aktifleştirildi. Bilgi akışı zihni felç ediyor.";
            
            // Altyazıları Göster
            const subBox = document.getElementById('subtitles');
            const subJa = document.getElementById('subtitle-ja');
            const subTr = document.getElementById('subtitle-tr');

            subBox.style.opacity = '1';
            subJa.innerText = "領域展開... 無量空処 (Ryōiki Tenkai... Muryō Kūsho)";
            subTr.innerText = "Alan Genişletme: Sonsuz Boşluk!";

            // Gemini Sesini Çek ve Çal
            const voiceUrl = await fetchGojoVoice();
            if (voiceUrl) {
                const audio = new Audio(voiceUrl);
                audio.play();
                
                // Bas patlaması seslendirmedeki gecikmeye paralel tetiklenir (yaklaşık 1.8 saniye sonra)
                setTimeout(() => {
                    playBassDrop();
                }, 1600);
            } else {
                // Yedek Tarayıcı Sentezleyicisi (Eğer API hatası alınırsa)
                playBassDrop();
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance("領域展開、無量空処");
                    utterance.lang = "ja-JP";
                    utterance.rate = 0.7;
                    window.speechSynthesis.speak(utterance);
                }
            }

            // Altyazıyı 5 saniye sonra gizle
            setTimeout(() => {
                subBox.style.opacity = '0';
            }, 5500);
        }

        function resetDomain() {
            isDomainActive = false;
            document.getElementById('domain-title').innerText = "Sıradan Gerçeklik";
            document.getElementById('domain-title').className = "font-jjk text-2xl font-bold tracking-wider text-white";
            document.getElementById('domain-subtitle').innerText = "Sonsuz Boşluğu açmak için aşağıdaki butona basın veya kameraya parmaklarınızı çaprazlayarak gösterin!";
            document.getElementById('subtitles').style.opacity = '0';
        }
    </script>

    <script>
        // --- MEDIAPIPE GESTURE DYNAMICS ---
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('gesture-canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusText = document.getElementById('gesture-status');

        function onResults(results) {
            // Tuvali temizle ve yeniden çiz
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                statusText.innerText = "El algılandı, mühür analiz ediliyor...";
                
                for (const landmarks of results.multiHandLandmarks) {
                    // El eklem çizgilerini çizdirme (Görsel geri bildirim için)
                    drawHandSkeleton(landmarks);

                    // Gojo'nun İşaret ve Orta Parmak Çaprazlama Mührünü Algılama (Infinite Void)
                    if (detectGojoGesture(landmarks)) {
                        statusText.innerHTML = "<span class='text-cyan-400 font-bold animate-pulse'>Gojo Mührü Algılandı! 🔥</span>";
                        triggerInfiniteVoid();
                    }
                }
            } else {
                statusText.innerText = "El aranıyor... Mührü kameraya gösterin.";
            }
            canvasCtx.restore();
        }

        // Basit İskelet Çizici
        function drawHandSkeleton(landmarks) {
            canvasCtx.fillStyle = '#00f0ff';
            canvasCtx.strokeStyle = 'rgba(255, 0, 240, 0.6)';
            canvasCtx.lineWidth = 3;

            // Parmak uçlarını küçük daireler halinde çiz
            landmarks.forEach(point => {
                const x = point.x * canvasElement.width;
                const y = point.y * canvasElement.height;
                canvasCtx.beginPath();
                canvasCtx.arc(x, y, 4, 0, 2 * Math.PI);
                canvasCtx.fill();
            });
        }

        // Gojo Parmak Çaprazlama Mührünün Algılanması
        function detectGojoGesture(landmarks) {
            // Parmak uç noktaları (Landmark ID'leri):
            // 8: İşaret Parmağı Ucu, 6: İşaret Parmağı Eklem Boğumu
            // 12: Orta Parmak Ucu, 10: Orta Parmak Eklem Boğumu
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];
            const indexPip = landmarks[6];
            const middlePip = landmarks[10];

            // 1. Parmakların dikey kalkık olması kontrolü
            const isIndexUp = indexTip.y < indexPip.y;
            const isMiddleUp = middleTip.y < middlePip.y;

            // 2. Yüzük ve serçe parmakların bükülü olması kontrolü
            const isRingDown = landmarks[16].y > landmarks[14].y;
            const isPinkyDown = landmarks[20].y > landmarks[18].y;

            // 3. İşaret ve Orta parmağın birbirine inanılmaz yakın veya üst üste gelmesi
            const distance = Math.hypot(indexTip.x - middleTip.x, indexTip.y - middleTip.y);

            // Mesafe eşiği çok düşük olmalı (birbirine dolanmış/temas eden parmaklar)
            return isIndexUp && isMiddleUp && isRingDown && isPinkyDown && distance < 0.05;
        }

        // MediaPipe El Dedektörünü Yapılandırma
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults(onResults);

        // Kamerayı Başlatma
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({ image: videoElement });
            },
            width: 320,
            height: 240
        });

        // Sayfa yüklendiğinde kamerayı ve sahneyi aktifleştir
        window.onload = function() {
            initThree();
            
            cameraUtils.start()
                .then(() => {
                    statusText.innerText = "Kamera Hazır. Mührü Yapın!";
                })
                .catch(err => {
                    statusText.innerText = "Kamera erişilemez durumda (Manuel Mod aktif).";
                    console.warn("Kamera erişim hatası:", err);
                });

            // Tuval ve Kamera Çözünürlük Eşlemesi
            canvasElement.width = canvasElement.clientWidth;
            canvasElement.height = canvasElement.clientHeight;
        };

        // --- BUTON ETKİLEŞİMLERİ ---
        document.getElementById('trigger-btn').addEventListener('click', () => {
            initAudio(); // Tarayıcı ses güvenlik engelini aşmak için
            triggerInfiniteVoid();
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            resetDomain();
        });
    </script>
</body>
</html>
